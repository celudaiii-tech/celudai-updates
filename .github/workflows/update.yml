name: Auto Update JSON

on:
  release:
    types: [published, deleted]  # ahora también escucha releases eliminados

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Update JSON based on release event
        run: |
          EVENT_TYPE="${{ github.event.action }}"
          TAG="${{ github.event.release.tag_name }}"
          APP_NAME=$(echo "$TAG" | sed -E 's/_v[0-9]+$//')
          DOWNLOAD_URL="${{ github.event.release.assets[0].browser_download_url || '' }}"
          VERSION=$(echo "$TAG" | sed -E 's/^.*_v([0-9]+)$/\1/' || 0)

          echo "Evento: $EVENT_TYPE"
          echo "App: $APP_NAME"
          echo "Version: $VERSION"
          echo "URL: $DOWNLOAD_URL"

          # Crear archivo si no existe
          if [ ! -f update.json ]; then
            echo '{ "apps": [] }' > update.json
          fi

          if [ "$EVENT_TYPE" = "deleted" ]; then
            # Eliminar la app del JSON
            jq --arg name "$APP_NAME" \
               '.apps |= map(select(.name != $name))' \
               update.json > tmp.json && mv tmp.json update.json
            echo "App $APP_NAME eliminada del JSON"
          else
            # Eliminar la app si ya existe (reemplazo)
            jq --arg name "$APP_NAME" \
               '.apps |= map(select(.name != $name))' \
               update.json > tmp.json && mv tmp.json update.json

            # Agregar versión nueva
            jq --arg name "$APP_NAME" \
               --arg url "$DOWNLOAD_URL" \
               --argjson version $VERSION \
               '.apps += [{
                 name: $name,
                 version: $version,
                 url: $url
               }]' \
               update.json > tmp.json && mv tmp.json update.json
          fi

      - name: Commit update.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add update.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update JSON"
            git push origin main

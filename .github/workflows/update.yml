name: Auto Update JSON

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Extract release info and update JSON
        run: |
          TAG="${{ github.event.release.tag_name }}"

          APP_NAME=$(echo "$TAG" | sed -E 's/_v[0-9]+$//')
          VERSION=$(echo "$TAG" | sed -E 's/^.*_v([0-9]+)$/\1/')
          DOWNLOAD_URL="${{ github.event.release.assets[0].browser_download_url }}"

          echo "App: $APP_NAME"
          echo "Version: $VERSION"
          echo "URL: $DOWNLOAD_URL"

          # Crear archivo si no existe
          if [ ! -f update.json ]; then
            echo '{ "apps": [] }' > update.json
          fi

          # Eliminar la app si ya existe
          jq --arg name "$APP_NAME" \
             '.apps |= map(select(.name != $name))' \
             update.json > tmp.json && mv tmp.json update.json

          # Agregar versión nueva
          jq --arg name "$APP_NAME" \
             --arg package "com.$APP_NAME.app" \
             --arg url "$DOWNLOAD_URL" \
             --argjson version $VERSION \
             '.apps += [{
               name: $name,
               package: $package,
               version: $version,
               url: $url
             }]' \
             update.json > tmp.json && mv tmp.json update.json

      - name: Commit update.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add update.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update JSON"
            git push origin main
          fi
